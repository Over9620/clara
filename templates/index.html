<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clara Web</title>
<style>
    body {
        margin: 0;
        background: #0d0d0f;
        font-family: Arial, sans-serif;
        color: #fff;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    #chat {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
    }

    .msg {
        margin-bottom: 15px;
        max-width: 80%;
        padding: 12px 16px;
        border-radius: 12px;
        line-height: 1.4;
    }

    .user {
        background: #1e1e2e;
        align-self: flex-end;
    }

    .clara {
        background: #2f2f4f;
        align-self: flex-start;
    }

    #inputBar {
        display: flex;
        padding: 10px;
        background: #111;
        border-top: 1px solid #333;
    }

    #msgInput {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #222;
        color: #fff;
        font-size: 16px;
    }

    #sendBtn {
        margin-left: 10px;
        padding: 12px 20px;
        background: #4c4cff;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    #sendBtn:hover {
        background: #6a6aff;
    }
</style>
</head>
<body>

<div id="chat"></div>

<div id="inputBar">
    <input id="msgInput" type="text" placeholder="Talk to Clara..." autocomplete="off">
    <button id="sendBtn">Send</button>
</div>

<script>
const API_URL = "https://clara-boih.onrender.com/clara";

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        addMessage(data.response, "clara");

    } catch (err) {
        addMessage("Error contacting Clara.", "clara");
    }
}

sendBtn.onclick = sendMessage;
input.onkeydown = (e) => {
    if (e.key === "Enter") sendMessage();
};
</script>

</body>
</html>
